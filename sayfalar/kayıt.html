<body>

     <style>
        body {
          background-color: #2b2b2b; 
          color: white;
        }
        
        a{
            color: red;
        }
        
        h3{
          color: red;
        }
        
    </style>
    <form action="onay.html" method="get">

<hr>
<br><br><br>
        <h3>Kayıt Bilgileri</h3>
<hr>
        <p>
            <label for="isim">İsim Soyisim:</label>
            <input type="text" id="isim" name="isim" required>
        </p>

        <p>
            <label for="eposta">E-mail:</label>
            <input type="email" id="eposta" name="eposta" required>
        </p>

        <p>
            <label for="sifre">Şifre:</label>
            <input type="password" id="sifre" name="sifre" required>
        </p>

        <p>
            <label for="renk">Renk Seçin:</label>
            <input type="color" id="renk" name="renk">
        </p>

        <p>
            <label for="memnuniyet">Memnuniyet Seviyeniz:</label>
            <input type="range" id="memnuniyet" name="memnuniyet" min="100" max="1000" step="100">
        </p>

        <p>Cinsiyetiniz:</p>
        <p>
            <label for="erkek">
                <input type="radio" id="erkek" name="cinsiyet" value="E"> Erkek
            </label>
            <label for="kadin">
                <input type="radio" id="kadin" name="cinsiyet" value="K"> Kadın
            </label>
        </p>

        <p>
            <button type="submit">Kaydet</button>
            <button type="reset">Formu Sil</button>
        </p>
    </form>
    <hr>
</body>
</html>
